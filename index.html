            all: "All",
            digital: "Digital",
            health: "Health",
            productivity: "Productivity",
            tech: "Tech",
            books: "Books",
            gear: "Creator Gear",
        };

        const filtersEl = document.getElementById('filters');
        const container = document.getElementById('links');
        const params = new URLSearchParams(window.location.search);
        const productFilter = params.get('p');

        let activeCategory = 'all';

        function render(cat) {
            container.innerHTML = '';
            const visible = productFilter
                ? links.filter(l => l.id === productFilter)
                : cat === 'all' ? links : links.filter(l => l.category === cat);

            visible.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.className = 'link-card';
                a.target = '_blank';
                a.rel = 'noopener';
                a.innerHTML = `
                    <div class="title">${link.title}</div>
                    <div class="desc">${link.desc}</div>
                    ${link.price ? `<div class="price">${link.price} on Amazon</div>` : ''}
                    ${link.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}
                `;
                container.appendChild(a);
            });
        }

        if (!productFilter) {
            Object.entries(categories).forEach(([key, label]) => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (key === 'all' ? ' active' : '');
                btn.textContent = label;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    render(key);
                };
                filtersEl.appendChild(btn);
            });
        }

        render('all');
