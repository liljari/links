<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Products</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .profile { text-align: center; margin-bottom: 32px; }
        .profile h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .profile p { color: #888; font-size: 14px; }
        .links { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 12px; }
        .link-card {
            display: block;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 16px 20px;
            text-decoration: none;
            color: #fff;
            transition: transform 0.15s, background 0.15s;
        }
        .link-card:hover { transform: scale(1.02); background: #222; }
        .link-card .title { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .link-card .desc { color: #999; font-size: 13px; }
        .link-card .tag {
            display: inline-block;
            background: #2a2a2a;
            color: #ccc;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="profile">
        <h1>My Top Picks</h1>
        <p>Products I personally use and recommend</p>
    </div>
    <div class="links" id="links"></div>
    <script>
        // VideoBot auto-updates this list
        const links = [
            {
                id: "mitolyn",
                title: "Mitolyn Energy Supplement",
                desc: "Boost your focus and mental clarity naturally",
                url: "https://bit.ly/4rW68th",
                tags: ["energy", "focus"]
            },
            {
                id: "energy-revolution",
                title: "Energy Revolution System",
                desc: "The system that changed how I earn online",
                url: "https://bit.ly/47QH0N8",
                tags: ["income", "side hustle"]
            },
            {
                id: "citrusburn",
                title: "CitrusBurn Weight Loss",
                desc: "Natural metabolism support that actually works",
                url: "https://bit.ly/47nArBA",
                tags: ["weight loss", "health"]
            }
        ];

        // Render links — supports 500+ links, filterable by ?p=product-id
        const container = document.getElementById('links');
        const params = new URLSearchParams(window.location.search);
        const filter = params.get('p');

        const visible = filter ? links.filter(l => l.id === filter) : links;

        visible.forEach(link => {
            const a = document.createElement('a');
            a.href = link.url;
            a.className = 'link-card';
            a.target = '_blank';
            a.rel = 'noopener';
            a.innerHTML = `
                <div class="title">${link.title}</div>
                <div class="desc">${link.desc}</div>
                ${link.tags.map(t => `<span class="tag">${t}</span>`).join(' ')}
            `;
            container.appendChild(a);
        });
    </script>
</body>
</html>
